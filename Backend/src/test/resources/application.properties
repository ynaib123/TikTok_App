# H2 in-memory tests cannot run the Postgres baseline migration.
# Hibernate creates the schema on the fly for tests.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Sprint securite : le rate limit par IP est utile en runtime mais casse les
# tests qui repetent des POST depuis 127.0.0.1. Desactive uniquement en test.
app.rate-limit.enabled=false
