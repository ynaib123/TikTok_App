spring:
  application:
    name: tiktok-app-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tiktok_app}
    username: ${SPRING_DATASOURCE_USERNAME:tiktok_app}
    password: ${SPRING_DATASOURCE_PASSWORD}
    # HikariCP — Spring Boot's default pool. Defaults are 10/30s/30s which is
    # fine for dev but invisible in prod logs. Declaring them here makes the
    # values reviewable and operations-friendly. Override per env via the
    # SPRING_DATASOURCE_HIKARI_* variables.
    hikari:
      pool-name: tiktok-app-hikari
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MIN_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME_MS:1800000}
      # Surfaces a stack-trace warning in logs if a connection is held > 30 s
      # without being returned. Helps catch transactional leaks.
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_MS:30000}
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "1"
    validate-on-migrate: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2s
      connect-timeout: 2s
      repositories:
        # Aucune entité @RedisHash dans le projet. Désactiver le scan évite le
        # warning "Could not safely identify store assignment" sur les repos JPA.
        enabled: false
      # Lettuce client is lazy : the connection factory bean is created at boot
      # but no TCP connection is opened until a @Cacheable method (or any
      # RedisTemplate operation) actually fires. Caches are gated by
      # app.redis.enabled in RedisCacheConfig — so a dev that runs without Redis
      # simply never triggers the connection.

server:
  port: ${PORT:${SERVER_PORT:8081}}

app:
  security:
    admin-email: ${APP_ADMIN_EMAIL:admin@tiktokapp.local}
    admin-password: ${APP_ADMIN_PASSWORD}
    admin-name: ${APP_ADMIN_NAME:Video Ops Admin}
    bootstrap-admin-on-startup: ${APP_BOOTSTRAP_ADMIN_ON_STARTUP:true}
    jwt-secret: ${APP_JWT_SECRET}
    access-minutes: ${APP_ACCESS_MINUTES:30}
    refresh-days: ${APP_REFRESH_DAYS:14}
    refresh-cookie-name: ${APP_REFRESH_COOKIE_NAME:tiktok_app_admin_refresh}
    access-cookie-name: ${APP_ACCESS_COOKIE_NAME:tiktok_app_admin_access}
    secure-cookies: ${APP_SECURE_COOKIES:false}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5174}
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.11.100:5174}
  video-ops:
    internal-api-secret: ${APP_VIDEO_OPS_INTERNAL_API_SECRET}
    workflow-callback-secret: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET}
    workflow-callback-hmac-secret: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET}
    workflow-callback-max-skew-seconds: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_MAX_SKEW_SECONDS:300}
    allow-legacy-workflow-callback-secret: ${APP_VIDEO_OPS_ALLOW_LEGACY_WORKFLOW_CALLBACK_SECRET:false}
    token-encryption-key: ${APP_VIDEO_OPS_TOKEN_ENCRYPTION_KEY}
    tiktok-client-key: ${APP_VIDEO_OPS_TIKTOK_CLIENT_KEY:}
    tiktok-client-secret: ${APP_VIDEO_OPS_TIKTOK_CLIENT_SECRET:}
    tiktok-redirect-uri: ${APP_VIDEO_OPS_TIKTOK_REDIRECT_URI:}
    tiktok-oauth-scopes: ${APP_VIDEO_OPS_TIKTOK_OAUTH_SCOPES:user.info.basic,video.publish}
    query-limit: ${APP_VIDEO_OPS_QUERY_LIMIT:50}
    idempotency-window-seconds: ${APP_VIDEO_OPS_IDEMPOTENCY_WINDOW_SECONDS:90}
    allowed-shotstack-hosts: ${APP_VIDEO_OPS_ALLOWED_SHOTSTACK_HOSTS:shotstack-api-v1-output.s3-ap-southeast-2.amazonaws.com}
    allowed-upload-hosts: ${APP_VIDEO_OPS_ALLOWED_UPLOAD_HOSTS:open-upload.tiktokapis.com,open.tiktokapis.com,business-api.tiktok.com}
    render-video:
      base-url: ${APP_VIDEO_OPS_RENDER_VIDEO_BASE_URL:http://localhost:8090}
    n8n:
      base-url: ${APP_VIDEO_OPS_N8N_BASE_URL:http://localhost:5678}
      read-timeout-ms: ${APP_VIDEO_OPS_N8N_READ_TIMEOUT_MS:600000}
      main-pipeline-path: ${APP_VIDEO_OPS_N8N_MAIN_PIPELINE_PATH:/webhook/fused-idea-script}
      script-generation-path: ${APP_VIDEO_OPS_N8N_SCRIPT_GENERATION_PATH:/webhook/script-generation}
      render-template-video-path: ${APP_VIDEO_OPS_N8N_RENDER_PATH:/webhook/render-template-video-remotion}
      check-shotstack-path: ${APP_VIDEO_OPS_N8N_CHECK_PATH:/webhook/check-shotstack}
      init-publish-tik-tok-path: ${APP_VIDEO_OPS_N8N_INIT_PUBLISH_PATH:/webhook/init-publish-tiktok}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    login:
      capacity: ${APP_RATE_LIMIT_LOGIN_CAPACITY:10}
      refill-seconds: ${APP_RATE_LIMIT_LOGIN_REFILL_SECONDS:60}
    workflows:
      capacity: ${APP_RATE_LIMIT_WORKFLOWS_CAPACITY:60}
      refill-seconds: ${APP_RATE_LIMIT_WORKFLOWS_REFILL_SECONDS:60}
    ai-agents:
      capacity: ${APP_RATE_LIMIT_AI_AGENTS_CAPACITY:20}
      refill-seconds: ${APP_RATE_LIMIT_AI_AGENTS_REFILL_SECONDS:60}
    audio:
      capacity: ${APP_RATE_LIMIT_AUDIO_CAPACITY:40}
      refill-seconds: ${APP_RATE_LIMIT_AUDIO_REFILL_SECONDS:60}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
  anthropic:
    enabled: ${APP_ANTHROPIC_ENABLED:false}
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${APP_ANTHROPIC_BASE_URL:https://api.anthropic.com}
    version: ${APP_ANTHROPIC_VERSION:2023-06-01}
    default-model-id: ${APP_ANTHROPIC_DEFAULT_MODEL_ID:claude-sonnet-4-6}
    max-tokens: ${APP_ANTHROPIC_MAX_TOKENS:4096}
    max-tool-loop-iterations: ${APP_ANTHROPIC_MAX_TOOL_LOOP_ITERATIONS:10}
    read-timeout-ms: ${APP_ANTHROPIC_READ_TIMEOUT_MS:90000}
  elevenlabs:
    enabled: ${APP_ELEVENLABS_ENABLED:false}
    api-key: ${ELEVENLABS_API_KEY:}
    base-url: ${APP_ELEVENLABS_BASE_URL:https://api.elevenlabs.io}
    default-model-id: ${APP_ELEVENLABS_DEFAULT_MODEL_ID:eleven_multilingual_v2}
    preview-max-chars: ${APP_ELEVENLABS_PREVIEW_MAX_CHARS:240}
    generate-max-chars: ${APP_ELEVENLABS_GENERATE_MAX_CHARS:4000}
    read-timeout-ms: ${APP_ELEVENLABS_READ_TIMEOUT_MS:60000}
    storage-path: ${APP_ELEVENLABS_STORAGE_PATH:/app/audio-assets}
    public-base-url: ${APP_ELEVENLABS_PUBLIC_BASE_URL:}
  tiktok-sounds:
    research-api-key: ${APP_TIKTOK_RESEARCH_API_KEY:}
    research-api-base-url: ${APP_TIKTOK_RESEARCH_BASE_URL:https://open.tiktokapis.com}
    oembed-base-url: ${APP_TIKTOK_OEMBED_BASE_URL:https://www.tiktok.com/oembed}
    refresh-enabled: ${APP_TIKTOK_SOUNDS_REFRESH_ENABLED:false}
    default-limit: ${APP_TIKTOK_SOUNDS_DEFAULT_LIMIT:40}
    read-timeout-ms: ${APP_TIKTOK_SOUNDS_READ_TIMEOUT_MS:15000}
  alerting:
    enabled: ${APP_ALERTING_ENABLED:true}
    slack-webhook-url: ${APP_ALERTING_SLACK_WEBHOOK_URL:}
    cooldown-seconds: ${APP_ALERTING_COOLDOWN_SECONDS:300}
    rate-limit-max-alerts: ${APP_ALERTING_RATE_LIMIT_MAX_ALERTS:10}
    rate-limit-window-seconds: ${APP_ALERTING_RATE_LIMIT_WINDOW_SECONDS:600}
    stuck-run-threshold-seconds: ${APP_ALERTING_STUCK_RUN_THRESHOLD_SECONDS:600}
    stuck-run-check-interval-ms: ${APP_ALERTING_STUCK_RUN_CHECK_INTERVAL_MS:120000}

# Phase 1.2 — Observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: tiktok-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Phase 1.5 — OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha

# Phase 1.4 — Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      n8n:
        baseConfig: default
        waitDurationInOpenState: 30s
      tiktok:
        baseConfig: default
        waitDurationInOpenState: 60s
      renderVideo:
        baseConfig: default
        waitDurationInOpenState: 30s
      pexels:
        baseConfig: default
      groq:
        baseConfig: default
      elevenlabs:
        baseConfig: default
        waitDurationInOpenState: 60s
      anthropic:
        baseConfig: default
        waitDurationInOpenState: 60s
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      n8n:
        baseConfig: default
        # Webhook n8n avec responseMode=responseNode: tout retry re-POST
        # le webhook et lance une 2e exécution dupliquée. Trigger best-effort.
        maxAttempts: 1
      tiktok:
        baseConfig: default
        maxAttempts: 2
      renderVideo:
        baseConfig: default
        maxAttempts: 1
      pexels:
        baseConfig: default
      groq:
        baseConfig: default
      elevenlabs:
        baseConfig: default
        maxAttempts: 2
      anthropic:
        baseConfig: default
        maxAttempts: 2
