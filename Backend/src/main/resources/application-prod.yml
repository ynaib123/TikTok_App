# Phase 2.12 — prod profile.

# Logs JSON structurés en production (Spring Boot 3.4+ built-in).
# Inclut automatiquement les champs MDC : traceId, workflowRunId, contentIdeaId.
logging:
  structured:
    format:
      console: logstash
  level:
    com.tiktokapp.backend: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN

app:
  security:
    secure-cookies: true

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

server:
  forward-headers-strategy: framework

# Swagger / OpenAPI desactive en prod (information disclosure).
# Re-active uniquement via override explicite si besoin.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Actuator sur un port dédié non exposé publiquement.
# Le port 8082 doit rester dans le réseau interne Docker uniquement (pas de mapping vers l'hôte).
# Prometheus scrape depuis le réseau interne sur ce port.
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8082}
