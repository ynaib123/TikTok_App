services:
  postgres:
    image: postgres:16
    container_name: tiktok-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tiktok_app
      POSTGRES_USER: tiktok_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok_app -d tiktok_app"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tiktok-app-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: tiktok-app-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: 8080
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tiktok_app
      SPRING_DATASOURCE_USERNAME: tiktok_app
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_ADMIN_EMAIL: admin@tiktokapp.local
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD}
      APP_ADMIN_NAME: Video Ops Admin
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174,http://192.168.11.100:5174}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost:5174}
      APP_VIDEO_OPS_INTERNAL_API_SECRET: ${APP_VIDEO_OPS_INTERNAL_API_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_MAX_SKEW_SECONDS: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_MAX_SKEW_SECONDS:-300}
      APP_VIDEO_OPS_ALLOW_LEGACY_WORKFLOW_CALLBACK_SECRET: ${APP_VIDEO_OPS_ALLOW_LEGACY_WORKFLOW_CALLBACK_SECRET:-true}
      APP_VIDEO_OPS_TOKEN_ENCRYPTION_KEY: ${APP_VIDEO_OPS_TOKEN_ENCRYPTION_KEY}
      APP_VIDEO_OPS_TIKTOK_CLIENT_KEY: ${APP_VIDEO_OPS_TIKTOK_CLIENT_KEY:-}
      APP_VIDEO_OPS_TIKTOK_CLIENT_SECRET: ${APP_VIDEO_OPS_TIKTOK_CLIENT_SECRET:-}
      APP_VIDEO_OPS_TIKTOK_REDIRECT_URI: ${APP_VIDEO_OPS_TIKTOK_REDIRECT_URI:-}
      APP_VIDEO_OPS_TIKTOK_OAUTH_SCOPES: ${APP_VIDEO_OPS_TIKTOK_OAUTH_SCOPES:-user.info.basic,video.publish}
      APP_VIDEO_OPS_ALLOWED_UPLOAD_HOSTS: ${APP_VIDEO_OPS_ALLOWED_UPLOAD_HOSTS:-open-upload.tiktokapis.com,open-upload-sg.tiktokapis.com,open.tiktokapis.com,business-api.tiktokapis.com}
      APP_VIDEO_OPS_ALLOWED_SHOTSTACK_HOSTS: ${APP_VIDEO_OPS_ALLOWED_SHOTSTACK_HOSTS:-}
      APP_VIDEO_OPS_RENDER_VIDEO_BASE_URL: ${APP_VIDEO_OPS_RENDER_VIDEO_BASE_URL:-http://render-video:8090}
      APP_ALERTING_ENABLED: ${APP_ALERTING_ENABLED:-true}
      APP_ALERTING_SLACK_WEBHOOK_URL: ${APP_ALERTING_SLACK_WEBHOOK_URL:-}
      APP_ALERTING_COOLDOWN_SECONDS: ${APP_ALERTING_COOLDOWN_SECONDS:-300}
      APP_ALERTING_RATE_LIMIT_MAX_ALERTS: ${APP_ALERTING_RATE_LIMIT_MAX_ALERTS:-10}
      APP_ALERTING_RATE_LIMIT_WINDOW_SECONDS: ${APP_ALERTING_RATE_LIMIT_WINDOW_SECONDS:-600}
      APP_ALERTING_STUCK_RUN_THRESHOLD_SECONDS: ${APP_ALERTING_STUCK_RUN_THRESHOLD_SECONDS:-600}
      APP_ALERTING_STUCK_RUN_CHECK_INTERVAL_MS: ${APP_ALERTING_STUCK_RUN_CHECK_INTERVAL_MS:-120000}
      APP_VIDEO_OPS_N8N_BASE_URL: ${APP_VIDEO_OPS_N8N_BASE_URL:-http://n8n:5678}
      APP_VIDEO_OPS_N8N_READ_TIMEOUT_MS: ${APP_VIDEO_OPS_N8N_READ_TIMEOUT_MS:-600000}
      APP_VIDEO_OPS_N8N_RENDER_PATH: ${APP_VIDEO_OPS_N8N_RENDER_PATH:-/webhook/render-template-video-remotion}
      APP_REDIS_ENABLED: ${APP_REDIS_ENABLED:-true}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-}

    ports:
      - "8080:8080"
    volumes:
      - ./Backend:/app
      - maven_cache:/root/.m2
      # target/ en volume nomme pour preserver les classes pre-compilees
      # de l'image (sinon le bind-mount ./Backend les masque). Le Dockerfile
      # warm-up populate ce volume au build, evitant un cold compile au boot.
      - backend_target:/app/target

  render-video:
    build:
      context: .
      dockerfile: RenderVideo/Dockerfile
    container_name: tiktok-app-render-video
    restart: unless-stopped
    # Chromium headless utilise /dev/shm pour la mémoire partagée (2 onglets internes
    # de Chrome + GPU process). Le défaut Docker (64 MB) fait crasher avec "Target closed".
    shm_size: '2gb'
    environment:
      PORT: 8090
      RENDER_VIDEO_SCHEMA_PATH: /contracts/render-video-job.schema.json
      RENDER_VIDEO_OUTPUT_DIR: /app/renders
      RENDER_VIDEO_PUBLIC_BASE_URL: ${APP_RENDER_VIDEO_PUBLIC_BASE_URL:-http://localhost:8090}
      APP_VIDEO_OPS_BACKEND_BASE_URL: http://backend:8080
      APP_VIDEO_OPS_INTERNAL_API_SECRET: ${APP_VIDEO_OPS_INTERNAL_API_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
    ports:
      - "8090:8090"
    volumes:
      - render_video_renders:/app/renders

  n8n:
    # DEV : latest accepté ici car les workflows ont été créés avec cette version.
    # Pour la prod, identifier la version exacte via `docker exec tiktok-app-n8n n8n --version`
    # puis la fixer dans docker-compose.prod-like.yml uniquement.
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: tiktok-app-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # DEV SEULEMENT — désactiver l'auth n8n en dev local uniquement
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-false}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      NODE_FUNCTION_ALLOW_BUILTIN: crypto,http,https,url
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_EDITOR_BASE_URL: http://localhost:5678
      APP_VIDEO_OPS_BACKEND_BASE_URL: http://backend:8080
      APP_VIDEO_OPS_INTERNAL_API_SECRET: ${APP_VIDEO_OPS_INTERNAL_API_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET}
      APP_VIDEO_OPS_TIKTOK_CLIENT_KEY: ${APP_VIDEO_OPS_TIKTOK_CLIENT_KEY:-}
      APP_VIDEO_OPS_TIKTOK_CLIENT_SECRET: ${APP_VIDEO_OPS_TIKTOK_CLIENT_SECRET:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://localhost:5678}
      # Image n8n sans Python : désactiver le runner Python interne pour
      # supprimer le warning "Failed to start Python task runner" répété.
      N8N_NATIVE_PYTHON_RUNNER: "false"
      N8N_RUNNERS_ENABLED: "false"
    volumes:
      - ./n8n-local:/home/node/.n8n
    depends_on:
      - backend
      - render-video

  frontend:
    build:
      context: ./Frontend/admin
    container_name: tiktok-app-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      VITE_API_BASE_URL: /api
      VITE_BACKEND_PROXY_TARGET: http://backend:8080
      VITE_USE_MOCK_ADMIN_AUTH: false
      VITE_ALLOWED_HOSTS: localhost,127.0.0.1,192.168.11.100
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./Frontend/admin:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: tiktok-app-ngrok
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: http backend:8080 --log=stdout
    depends_on:
      - backend

volumes:
  postgres_data:
  n8n_data:
  maven_cache:
  admin_node_modules:
  backend_target:
  render_video_renders:
  redis_data:
