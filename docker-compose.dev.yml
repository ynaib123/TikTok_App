# Phase 2.11 — local dev stack: Postgres + n8n + backend + admin frontend.
# Usage: docker compose -f docker-compose.dev.yml up
#
# Notes:
# - Backend uses SPRING_PROFILES_ACTIVE=dev and reads secrets from .env files.
# - n8n volume mounts the workflows directory so changes are picked up live.
# - Frontend dev server proxies /api to backend at http://backend:8081.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tiktok_app
      POSTGRES_USER: tiktok_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok_app"]
      interval: 5s
      timeout: 3s
      retries: 10

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER?set in .env}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD?set in .env}
      WEBHOOK_URL: http://localhost:5678/
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./Backend/tools/n8n-workflows:/data/workflows:ro

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    volumes:
      - ./Backend:/app
      - maven-cache:/root/.m2
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tiktok_app
      SPRING_DATASOURCE_USERNAME: tiktok_app
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD?set in .env}
      APP_VIDEO_OPS_N8N_BASE_URL: http://n8n:5678
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD?set in .env}
      APP_JWT_SECRET: ${APP_JWT_SECRET?set in .env}
      APP_VIDEO_OPS_INTERNAL_API_SECRET: ${APP_VIDEO_OPS_INTERNAL_API_SECRET?set in .env}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_SECRET?set in .env}
      APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET: ${APP_VIDEO_OPS_WORKFLOW_CALLBACK_HMAC_SECRET?set in .env}
      APP_VIDEO_OPS_TOKEN_ENCRYPTION_KEY: ${APP_VIDEO_OPS_TOKEN_ENCRYPTION_KEY?set in .env}
    ports:
      - "8081:8081"

  admin:
    build:
      context: ./Frontend/admin
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./Frontend/admin:/app
      - admin-node-modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: /api
      VITE_BACKEND_PROXY_TARGET: http://backend:8081
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5174:5174"
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  postgres-data:
  n8n-data:
  maven-cache:
  admin-node-modules:
